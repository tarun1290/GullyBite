# Build a signed release APK for the GullyBite Staff app.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   • KEYSTORE_BASE64    — release keystore, base64-encoded.
#                          Generate with:  base64 -w 0 your-keystore.jks
#                          (on macOS:      base64 -i your-keystore.jks | tr -d '\n')
#   • KEYSTORE_PASSWORD  — store password supplied to keytool at create time
#   • KEY_ALIAS          — alias name inside the keystore
#   • KEY_PASSWORD       — password for the key (often same as keystore password)
#
# Local Gradle build only — no EAS, no Expo account, no `expo login`.
# `npx expo prebuild` regenerates android/, then patch-gradle-signing.js
# injects a release signingConfig that reads -P Gradle properties.

name: Build Android Staff APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - staff-app/**

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: staff-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: staff-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run expo prebuild (generate android/)
        env:
          # Baked into the bundle at build time. Change this only when
          # the EC2 host changes — staff users will need a fresh APK.
          EXPO_PUBLIC_API_URL: https://gullybite.duckdns.org
        run: npx expo prebuild --platform android --no-install

      # `npx expo prebuild` doesn't fire the package.json npm
      # postprebuild lifecycle, so we invoke the signing-config patcher
      # explicitly. Without this, android/app/build.gradle has no
      # release signingConfig and assembleRelease falls back to the
      # debug key (or fails).
      - name: Patch Gradle signing config
        run: node scripts/patch-gradle-signing.js

      - name: Decode keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/gullybite-staff.keystore
          # 0-byte file means decode silently failed (e.g. secret was
          # set with stray whitespace) — keytool would reject this far
          # later in the build, so check now.
          test -s android/app/gullybite-staff.keystore

      - name: Build release APK
        working-directory: staff-app/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -PkeystorePath=../app/gullybite-staff.keystore \
            -PkeystorePassword="$KEYSTORE_PASSWORD" \
            -PkeyAlias="$KEY_ALIAS" \
            -PkeyPassword="$KEY_PASSWORD"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gullybite-staff-apks
          # Upload the entire release/ directory so both per-ABI APKs
          # land in the artifact (Gradle ABI splits with universalApk:false
          # produces app-arm64-v8a-release.apk + app-armeabi-v7a-release.apk
          # but no app-release.apk fat fallback).
          path: staff-app/android/app/build/outputs/apk/release/
          retention-days: 30
