name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        # This workflow lives inside the staff-app subtree when the repo
        # bundles it alongside the main monorepo. When the app is hosted
        # on its own, change `working-directory` to `.`.
        working-directory: staff-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: staff-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Expo prebuild (Android)
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Decode keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/gullybite-staff.keystore

      - name: Gradle assembleRelease
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        working-directory: staff-app/android
        run: |
          ./gradlew assembleRelease \
            -PkeystorePath=app/gullybite-staff.keystore \
            -PkeystorePassword='${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' \
            -PkeyAlias='${{ secrets.ANDROID_KEY_ALIAS }}' \
            -PkeyPassword='${{ secrets.ANDROID_KEY_PASSWORD }}'

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: GullyBite-Staff-Release
          path: staff-app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14
